name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        arch: [x64, arm64]

    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: |
          npm run build:pre
          npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Rename artifact for consistent naming
        run: |
          cd dist
          # electron-builder may omit arch suffix for default arch, normalize it
          shopt -s nullglob
          for f in *-mac.zip; do
            if [[ "$f" != *"-${{ matrix.arch }}-"* ]]; then
              new_name="${f%-mac.zip}-${{ matrix.arch }}-mac.zip"
              mv "$f" "$new_name"
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: dist/*-${{ matrix.arch }}-mac.zip
          retention-days: 7

  release:
    needs: build
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac-x64/*.zip
            artifacts/mac-arm64/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
